<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaohsiung Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-green-bg: #e8f3ed;
            --soft-green-label: #5a7d6a;
            --soft-green-border: #c2d6cc;
            --trans-accent: #5d9cec;
            --highlight-red: #d63031; 
            --highlight-purple: #a569bd;
            --highlight-bg: #f3ebff;
            --text-dark: #2d3436;
        }

        body { font-family: 'Lexend', 'Noto Sans TC', sans-serif; background-color: #fcfdfc; margin: 0; padding: 0; color: var(--text-dark); }
        
        .sticky-header { 
            position: sticky; top: 0; background: var(--soft-green-bg); z-index: 100; 
            padding: 12px; border-bottom: 1px solid var(--soft-green-border);
        }
        .filter-card { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; max-width: 600px; margin: 0 auto; }
        .input-box label { font-size: 10px; font-weight: bold; color: var(--soft-green-label); margin-bottom: 4px; display: block; }
        select { padding: 10px; border-radius: 10px; border: 1px solid var(--soft-green-border); font-size: 14px; background: #ffffff; width: 100%; font-weight: 600; outline: none; }

        .accordion-item { margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); background: white; border: 1px solid #eee; }
        .accordion-header { padding: 15px; color: white; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; background: var(--trans-accent); }
        
        .accordion-content { display: none; padding: 10px; background: #fdfdfd; }
        .accordion-content.open { display: block; }

        .arrow { font-size: 10px; transition: transform 0.3s; }
        .rotate { transform: rotate(90deg); }

        .card { 
            background: white; border-radius: 10px; margin-bottom: 12px; padding: 14px; 
            border: 1.5px solid #d9e6f7; border-left: 6px solid var(--trans-accent);
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s ease-in-out;
        }

        .is-me-card {
            background-color: var(--highlight-bg) !important;
            border: 3px solid var(--highlight-purple) !important;
            border-left: 10px solid var(--highlight-purple) !important;
            box-shadow: 0 4px 15px rgba(165, 105, 189, 0.3);
        }

        .name-highlight { color: var(--highlight-red); font-weight: 800; }

        .hotel-link {
            font-size: 11px; padding: 8px 14px; border-radius: 8px;
            background: white; color: var(--trans-accent);
            text-decoration: none; font-weight: 700; border: 2px solid var(--trans-accent);
            white-space: nowrap; display: inline-block;
        }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="filter-card">
        <div class="input-box">
            <label>日期 / Tanggal</label>
            <select id="dateSelect" onchange="render()"></select>
        </div>
        <div class="input-box">
            <label>姓名 / Nama</label>
            <select id="userSelect" onchange="render()">
                <option value="">-- 請選擇 / Pilih --</option>
            </select>
        </div>
    </div>
</div>

<div class="accordion-item">
    <div class="accordion-header" onclick="toggleAccordion('trans-body', 'trans-arrow')">
        <span>🚗 接送 Antar-Jemput</span><span id="trans-arrow" class="arrow">▶</span>
    </div>
    <div id="trans-body" class="accordion-content"><div id="transContent"></div></div>
</div>

<script>
    const URL_TEIO = "https://maps.app.goo.gl/Fgyf4fjaFsWoHRax5"; 
    const URL_TENSI = "https://maps.app.goo.gl/ECXuxu3BWNxhPFrm7"; 

    const db = {
        "6/30": [
            { n: "Yunus", s: "帝后1, 帝后2" }, { n: "Erik", s: "帝后3, 帝后4" }, { n: "Melody", s: "帝后5, 帝后6" },
            { n: "Jammy", s: "帝后7, 帝后8" }, { n: "陳皇傑", s: "帝后9, 帝后10" }, { n: "Tommy", s: "帝后11, 帝后12" },
            { n: "Nikai", s: "天子閣1, 天子閣2, 天子閣3" }
        ],
        "7/2": [
            { n: "Nikai", s: "帝后1, 帝后2" }, { n: "Yusuf", s: "帝后3, 帝后4" }, { n: "Erik", s: "帝后5, 帝后6" },
            { n: "周宛錚", s: "帝后7, 帝后8" }, { n: "Melody", s: "帝后9, 帝后10" }, { n: "Selia", s: "帝后11, 帝后12" },
            { n: "陳皇傑", s: "帝后13, 帝后14" }, { n: "Tommy", s: "帝后15, 帝后16" }
        ],
        "7/6": [
            { n: "Erik", s: "帝后1, 帝后2" }, { n: "Nikai", s: "帝后3, 帝后4, 帝后5" }, { n: "Melody", s: "天子閣1, 天子閣2" },
            { n: "Yunus", s: "天子閣3, 天子閣4, 天子閣5" }, { n: "周宛錚", s: "天子閣6, 天子閣7" }, { n: "Jammy", s: "天子閣8, 天子閣9, 天子閣10" },
            { n: "Selia", s: "天子閣11, 天子閣12, 天子閣13" }
        ]
    };

    function toggleAccordion(id, arrowId) {
        document.getElementById(id).classList.toggle('open');
        document.getElementById(arrowId).classList.toggle('rotate');
    }

    function init() {
        const dSel = document.getElementById('dateSelect');
        const uSel = document.getElementById('userSelect');
        const names = new Set();
        Object.keys(db).forEach(d => {
            const o = document.createElement('option'); o.value = d; o.textContent = d; dSel.appendChild(o);
            db[d].forEach(i => names.add(i.n));
        });
        Array.from(names).sort().forEach(n => {
            const o = document.createElement('option'); o.value = n; o.textContent = n; uSel.appendChild(o);
        });
        render();
    }

    function render() {
        const date = document.getElementById('dateSelect').value;
        const user = document.getElementById('userSelect').value;
        if (!db[date]) return;
        
        let html = '';
        db[date].forEach(item => {
            const isMe = (user && item.n === user);
            const cardClass = isMe ? 'card is-me-card' : 'card';
            const namePart = `<span class="${isMe ? 'name-highlight' : ''}">${item.n}</span>`;
            
            // ロジック: 「帝后」が含まれれば URL_TEIO(.../7)、それ以外は URL_TENSI(.../8)
            const mapUrl = item.s.indexOf("帝后") !== -1 ? URL_TEIO : URL_TENSI;
            
            html += `
                <div class="${cardClass}">
                    <div>🚗 ${namePart}: ${item.s}</div>
                    <a href="${mapUrl}" class="hotel-link" target="_blank" rel="noopener noreferrer">MAP 📍</a>
                </div>`;
        });
        document.getElementById('transContent').innerHTML = html;
    }

    init();
</script>
</body>
</html>

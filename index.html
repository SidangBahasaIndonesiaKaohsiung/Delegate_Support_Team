<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaohsiung Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-green-bg: #e8f3ed;
            --soft-green-label: #5a7d6a;
            --soft-green-border: #c2d6cc;
            --soft-green-surface: #f7fbf8;
            --trans-accent: #5d9cec;
            --evangel-accent: #f39c12;
            --highlight-red: #d63031;
            --highlight-purple: #8b5fbf;
            --highlight-bg: #f7f1ff;
            --text-dark: #2d3436;
            --text-soft: #66757f;
            --card-border: #e9ecef;
            --shadow: 0 10px 26px rgba(32, 58, 43, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Lexend", "Noto Sans TC", sans-serif;
            color: var(--text-dark);
            background:
                radial-gradient(circle at top left, rgba(93, 156, 236, 0.07), transparent 28%),
                radial-gradient(circle at top right, rgba(243, 156, 18, 0.08), transparent 26%),
                #fcfdfc;
        }

        .page {
            width: min(920px, calc(100% - 20px));
            margin: 0 auto;
            padding: 0 0 28px;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 0;
            background: rgba(252, 253, 252, 0.92);
            backdrop-filter: blur(12px);
        }

        .filter-card {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--soft-green-border);
            border-radius: 16px;
            background: var(--soft-green-bg);
            box-shadow: var(--shadow);
        }

        .input-box label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--soft-green-label);
        }

        select {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--soft-green-border);
            border-radius: 10px;
            background: #fff;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
        }

        select:focus {
            border-color: var(--trans-accent);
            box-shadow: 0 0 0 3px rgba(93, 156, 236, 0.14);
        }

        .summary {
            margin: 14px 2px 0;
            color: var(--text-soft);
            font-size: 13px;
        }

        .accordion-item {
            margin-top: 12px;
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .accordion-header {
            width: 100%;
            padding: 15px 16px;
            border: 0;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .bg-trans {
            background: var(--trans-accent);
        }

        .bg-evangel {
            background: var(--evangel-accent);
        }

        .accordion-content {
            display: none;
            padding: 12px;
            background: #fdfdfd;
        }

        .accordion-content.open {
            display: block;
        }

        .arrow {
            font-size: 11px;
            transition: transform 0.25s ease;
        }

        .rotate {
            transform: rotate(90deg);
        }

        .card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding: 14px;
            border: 1.5px solid var(--card-border);
            border-left: 6px solid #ccc;
            border-radius: 12px;
            background: #fff;
        }

        .card:last-child {
            margin-bottom: 0;
        }

        .border-evangel {
            border-left-color: var(--evangel-accent);
        }

        .is-me-card {
            background: var(--highlight-bg);
            border-color: rgba(139, 95, 191, 0.5);
            border-left-color: var(--highlight-purple);
        }

        .card-main {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            margin: 0 0 8px;
            font-size: 15px;
            font-weight: 800;
        }

        .card-list {
            margin: 0;
            color: var(--text-dark);
            line-height: 1.7;
            font-size: 14px;
        }

        .name-highlight {
            color: var(--highlight-red);
            font-weight: 800;
        }

        .hotel-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #fff;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .hotel-link:hover,
        .hotel-link:focus-visible {
            border-color: var(--trans-accent);
            color: var(--trans-accent);
            outline: none;
        }

        .empty {
            padding: 18px 14px;
            border: 1px dashed var(--soft-green-border);
            border-radius: 12px;
            background: var(--soft-green-surface);
            color: var(--text-soft);
            text-align: center;
            font-size: 13px;
        }

        @media (max-width: 680px) {
            .page {
                width: min(100%, calc(100% - 14px));
            }

            .filter-card {
                grid-template-columns: 1fr;
            }

            .card {
                flex-direction: column;
            }

            .hotel-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="sticky-header">
        <div class="filter-card">
            <div class="input-box">
                <label for="dateSelect">日期 / Tanggal</label>
                <select id="dateSelect" onchange="render()"></select>
            </div>
            <div class="input-box">
                <label for="userSelect">姓名 / Nama</label>
                <select id="userSelect" onchange="render()">
                    <option value="">-- 請選擇 / Pilih --</option>
                </select>
            </div>
        </div>
        <div class="summary" id="summaryText"></div>
    </div>

    <section class="accordion-item">
        <button class="accordion-header bg-trans" type="button" aria-expanded="false" aria-controls="trans-body" onclick="toggleAccordion('trans-body', 'trans-arrow', this)">
            <span>接送 Antar-Jemput</span>
            <span id="trans-arrow" class="arrow">▶</span>
        </button>
        <div id="trans-body" class="accordion-content">
            <div id="transContent"></div>
        </div>
    </section>

    <section class="accordion-item">
        <button class="accordion-header bg-evangel" type="button" aria-expanded="true" aria-controls="evangel-body" onclick="toggleAccordion('evangel-body', 'evangel-arrow', this)">
            <span>傳道 Penginjilan</span>
            <span id="evangel-arrow" class="arrow rotate">▶</span>
        </button>
        <div id="evangel-body" class="accordion-content open">
            <div id="evangelContent"></div>
        </div>
    </section>
</div>

<script>
    const URL_TEIO = "https://maps.app.goo.gl/Fgyf4fjaFsWoHRax5";
    const URL_TENSI = "https://maps.app.goo.gl/ECXuxu3BWNxhPFrm7";
    const HOTEL_KEYWORDS = ["帝后", "天子閣"];

    const dbEvangel = {
        "6/30": [
            { n: "Yunus", s: "帝后1, 帝后2, SAITO CHIEMI, Sayo, Tina" },
            { n: "Eric", s: "帝后3, 帝后4, Dina, Linling, Stephanie" },
            { n: "Melody", s: "帝后5, 帝后6, Lilian" },
            { n: "Jammy", s: "帝后7, 帝后8, 張苧萱" },
            { n: "Tommy", s: "帝后11, 帝后12, Linda, 王雅貞" },
            { n: "Nikai", s: "天子閣1, 天子閣2, 天子閣3, Henokh, Joselin" }
        ],
        "7/2": [
            { n: "Nikai", s: "帝后1, 帝后2, Mei, Tina, Vina" },
            { n: "Yusuf", s: "帝后3, 帝后4, Joan, 黃詩吟" },
            { n: "Eric", s: "帝后5, 帝后6, Dina" },
            { n: "周宛錚", s: "帝后7, 帝后8, Elli, Linling, Sayo" },
            { n: "Melody", s: "帝后9, 帝后10, 張苧萱, Joselin, Henokh" },
            { n: "Selia", s: "帝后11, 帝后12, SAITO CHIEMI, Lusi, Daud" },
            { n: "Tommy", s: "帝后15, 帝后16, Linda, 王雅貞, Stephanie" }
        ],
        "7/6": [
            { n: "Eric", s: "帝后1, 帝后2, Dina" },
            { n: "Nikai", s: "帝后3, 帝后4, 帝后5, Ken, 松宮（劉）麗娟, Vina, Lilian" },
            { n: "Melody", s: "天子閣1, 天子閣2, 黃詩吟" },
            { n: "Yunus", s: "天子閣3, 天子閣4, 天子閣5, Yoshiya, Jamie, Lina, Elli" },
            { n: "周宛錚", s: "天子閣6, 天子閣7, 王雅貞" },
            { n: "Jammy", s: "天子閣8, 天子閣9, 天子閣10, Stephanie, Rut" },
            { n: "Selia", s: "天子閣11, 天子閣12, 天子閣13, Linling, Sayo" }
        ]
    };

    const splitAssignments = value => value.split(",").map(item => item.trim()).filter(Boolean);
    const isHotel = name => HOTEL_KEYWORDS.some(keyword => name.includes(keyword));

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function toggleAccordion(id, arrowId, button) {
        const content = document.getElementById(id);
        const arrow = document.getElementById(arrowId);
        const isOpen = content.classList.toggle("open");
        arrow.classList.toggle("rotate", isOpen);
        button.setAttribute("aria-expanded", String(isOpen));
    }

    function init() {
        const dSel = document.getElementById("dateSelect");
        const uSel = document.getElementById("userSelect");
        const allNames = new Set();
        const dates = Object.keys(dbEvangel);

        dates.forEach(date => {
            const opt = document.createElement("option");
            opt.value = date;
            opt.textContent = date;
            dSel.appendChild(opt);

            dbEvangel[date].forEach(item => {
                allNames.add(item.n);
                splitAssignments(item.s)
                    .filter(name => !isHotel(name))
                    .forEach(name => allNames.add(name));
            });
        });

        Array.from(allNames).sort((a, b) => a.localeCompare(b, "zh-Hant")).forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            uSel.appendChild(opt);
        });

        if (dates.length > 0) {
            dSel.value = dates[0];
        }

        render();
    }

    function formatAssignmentList(assignments, selectedUser) {
        return assignments.map(name => {
            const safeName = escapeHtml(name);
            return name === selectedUser ? `<span class="name-highlight">${safeName}</span>` : safeName;
        }).join(", ");
    }

    function render() {
        const date = document.getElementById("dateSelect").value;
        const selectedUser = document.getElementById("userSelect").value;
        const evContainer = document.getElementById("evangelContent");
        const summary = document.getElementById("summaryText");
        const dayData = dbEvangel[date] || [];

        if (dayData.length === 0) {
            evContainer.innerHTML = '<div class="empty">No schedule yet.</div>';
            summary.textContent = "";
            return;
        }

        summary.textContent = selectedUser
            ? `${date} 共 ${dayData.length} 組，已標示 ${selectedUser} 的安排。`
            : `${date} 共 ${dayData.length} 組。`;

        const evHtml = dayData.map(item => {
            const assignments = splitAssignments(item.s);
            const isMe = selectedUser && (item.n === selectedUser || assignments.includes(selectedUser));
            const cardClass = isMe ? "card is-me-card" : "card border-evangel";
            const highlightedLeader = item.n === selectedUser
                ? `<span class="name-highlight">${escapeHtml(item.n)}</span>`
                : escapeHtml(item.n);
            const mapUrl = assignments.some(name => name.includes("帝后")) ? URL_TEIO : URL_TENSI;

            return `
                <article class="${cardClass}">
                    <div class="card-main">
                        <p class="card-title">📖 ${highlightedLeader}</p>
                        <p class="card-list">${formatAssignmentList(assignments, selectedUser)}</p>
                    </div>
                    <a class="hotel-link" href="${mapUrl}" target="_blank" rel="noopener noreferrer">MAP</a>
                </article>
            `;
        }).join("");

        evContainer.innerHTML = evHtml;
        document.getElementById("transContent").innerHTML = '<div class="empty">Daftar sedang diperbarui...</div>';
    }

    window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>

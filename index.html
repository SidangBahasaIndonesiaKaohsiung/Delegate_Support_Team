<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaohsiung Schedule</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-green-bg: #e8f3ed;
            --soft-green-label: #5a7d6a;
            --soft-green-border: #c2d6cc;
            --trans-accent: #5d9cec;
            --evangel-accent: #f39c12; /* 伝道用の色 */
            --highlight-red: #d63031; 
            --highlight-purple: #a569bd;
            --highlight-bg: #f3ebff;
            --text-dark: #2d3436;
        }

        body { font-family: 'Lexend', 'Noto Sans TC', sans-serif; background-color: #fcfdfc; margin: 0; padding: 0; color: var(--text-dark); }
        
        .sticky-header { 
            position: sticky; top: 0; background: var(--soft-green-bg); z-index: 100; 
            padding: 12px; border-bottom: 1px solid var(--soft-green-border);
        }
        .filter-card { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; max-width: 600px; margin: 0 auto; }
        .input-box label { font-size: 10px; font-weight: bold; color: var(--soft-green-label); margin-bottom: 4px; display: block; }
        select { padding: 10px; border-radius: 10px; border: 1px solid var(--soft-green-border); font-size: 14px; background: #ffffff; width: 100%; font-weight: 600; outline: none; }

        .accordion-item { margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); background: white; border: 1px solid #eee; }
        .accordion-header { padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        .bg-trans { background: var(--trans-accent); }
        .bg-evangel { background: var(--evangel-accent); }
        
        .accordion-content { padding: 10px; background: #fdfdfd; }

        .card { 
            background: white; border-radius: 10px; margin-bottom: 12px; padding: 14px; 
            border: 1.5px solid #eee; border-left: 6px solid #ccc;
            display: flex; justify-content: space-between; align-items: center;
        }
        .border-trans { border-left-color: var(--trans-accent); }
        .border-evangel { border-left-color: var(--evangel-accent); }

        .is-me-card {
            background-color: var(--highlight-bg) !important;
            border: 3px solid var(--highlight-purple) !important;
            border-left: 10px solid var(--highlight-purple) !important;
        }

        .name-highlight { color: var(--highlight-red); font-weight: 800; }

        .hotel-link {
            font-size: 11px; padding: 10px 14px; border-radius: 8px;
            background: white; color: var(--text-dark);
            text-decoration: none; font-weight: 700; border: 2px solid #ddd;
            white-space: nowrap; display: inline-block;
        }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="filter-card">
        <div class="input-box">
            <label>日期 / Tanggal</label>
            <select id="dateSelect" onchange="render()"></select>
        </div>
        <div class="input-box">
            <label>姓名 / Nama</label>
            <select id="userSelect" onchange="render()">
                <option value="">-- 請選擇 / Pilih --</option>
            </select>
        </div>
    </div>
</div>

<div class="accordion-item">
    <div class="accordion-header bg-trans"><span>🚗 接送 Antar-Jemput</span></div>
    <div class="accordion-content"><div id="transContent"></div></div>
</div>

<div class="accordion-item">
    <div class="accordion-header bg-evangel"><span>📖 傳道 Penginjilan</span></div>
    <div class="accordion-content"><div id="evangelContent"></div></div>
</div>

<script>
    const URL_TEIO = "https://maps.app.goo.gl/Fgyf4fjaFsWoHRax5"; 
    const URL_TENSI = "https://maps.app.goo.gl/ECXuxu3BWNxhPFrm7"; 

    // 伝道（電動組）のデータ
    const dbEvangel = {
        "6/30": [
            { n: "Yunus", s: "帝后1, 帝后2, SAITO CHIEMI, Sayo, Tina" },
            { n: "Eric", s: "帝后3, 帝后4, Dina, Linling, Stephanie" },
            { n: "Melody", s: "帝后5, 帝后6, Lilian" },
            { n: "Jammy", s: "帝后7, 帝后8, 張苧萱" },
            { n: "Tommy", s: "帝后11, 帝后12, Linda, 王雅貞" },
            { n: "Nikai", s: "天子閣1, 天子閣2, 天子閣3, Henokh, Joselin" }
        ],
        "7/2": [
            { n: "Nikai", s: "帝后1, 帝后2, Mei, Tina, Vina" },
            { n: "Yusuf", s: "帝后3, 帝后4, Joan, 黃詩吟" },
            { n: "Eric", s: "帝后5, 帝后6, Dina" },
            { n: "周宛錚", s: "帝后7, 帝后8, Elli, Linling, Sayo" },
            { n: "Melody", s: "帝后9, 帝后10, 張苧萱, Joselin, Henokh" },
            { n: "Selia", s: "帝后11, 帝后12, SAITO CHIEMI, Lusi, Daud" },
            { n: "Tommy", s: "帝后15, 帝后16, Linda, 王雅貞, Stephanie" }
        ],
        "7/6": [
            { n: "Eric", s: "帝后1, 帝后2, Dina" },
            { n: "Nikai", s: "帝后3, 帝后4, 帝后5, Ken, 松宮（劉）麗娟, Vina, Lilian" },
            { n: "Melody", s: "天子閣1, 天子閣2, 黃詩吟" },
            { n: "Yunus", s: "天子閣3, 天子閣4, 天子閣5, Yoshiya, Jamie, Lina, Elli" },
            { n: "周宛錚", s: "天子閣6, 天子閣7, 王雅貞" },
            { n: "Jammy", s: "天子閣8, 天子閣9, 天子閣10, Stephanie, Rut" },
            { n: "Selia", s: "天子閣11, 天子閣12, 天子閣13, Linling, Sayo" }
        ]
    };

    function init() {
        const dSel = document.getElementById('dateSelect');
        const uSel = document.getElementById('userSelect');
        const allNames = new Set();

        Object.keys(dbEvangel).forEach(date => {
            const opt = document.createElement('option');
            opt.value = date; opt.textContent = date;
            dSel.appendChild(opt);

            dbEvangel[date].forEach(item => {
                allNames.add(item.n);
                item.s.split(', ').forEach(name => {
                    if (!name.includes('帝后') && !name.includes('天子閣')) allNames.add(name);
                });
            });
        });

        Array.from(allNames).sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;
            uSel.appendChild(opt);
        });

        render();
    }

    function render() {
        const date = document.getElementById('dateSelect').value;
        const selectedUser = document.getElementById('userSelect').value;
        const evContainer = document.getElementById('evangelContent');
        
        if (!dbEvangel[date]) return;
        
        let evHtml = '';
        dbEvangel[date].forEach(item => {
            const isMe = (selectedUser && (item.n === selectedUser || item.s.includes(selectedUser)));
            const cardClass = isMe ? 'card is-me-card' : 'card border-evangel';
            
            let contentText = `📖 <strong>${item.n}</strong>: ${item.s}`;
            if (selectedUser && contentText.includes(selectedUser)) {
                const regex = new RegExp(`(${selectedUser})`, 'g');
                contentText = contentText.replace(regex, `<span class="name-highlight">$1</span>`);
            }
            
            const mapUrl = item.s.includes("帝后") ? URL_TEIO : URL_TENSI;
            
            evHtml += `
                <div class="${cardClass}">
                    <div style="flex:1;">${contentText}</div>
                    <button onclick="window.open('${mapUrl}', '_blank')" class="hotel-link">MAP 📍</button>
                </div>`;
        });
        evContainer.innerHTML = evHtml;
        
        // 送迎セクションは別途データが必要な場合はここに追加
        document.getElementById('transContent').innerHTML = "<p style='font-size:12px; color:#999;'>--- 資料更新中 ---</p>";
    }

    window.onload = init;
</script>
</body>
</html>

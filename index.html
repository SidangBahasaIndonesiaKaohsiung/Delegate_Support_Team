        ["天子閣3", "Nikai", "帝后15", "Tommy", "天子閣10", "Jammy"],
        ["", "", "帝后16", "Tommy", "天子閣11", "Selia"],
        ["", "", "", "", "天子閣12", "Selia"],
        ["", "", "", "", "天子閣13", "Selia"]
    ];

    function escapeHtml(value) {
        return String(value)
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("'", "&#39;");
    }

    function toggleAccordion(id, arrowId, button) {
        const content = document.getElementById(id);
        const arrow = document.getElementById(arrowId);
        const isOpen = content.classList.toggle("open");
        arrow.classList.toggle("rotate", isOpen);
        button.setAttribute("aria-expanded", String(isOpen));
    function buildPersonClass(type) {
        if (!type) return "";
        return type.split(" ").map(token => {
            if (token === "yellow") return "bg-yellow";
            if (token === "green") return "bg-green";
            if (token === "pink") return "bg-pink";
            if (token === "text-red") return "text-red";
            return "";
        }).filter(Boolean).join(" ");
    }

    function init() {
        const dSel = document.getElementById("dateSelect");
        const uSel = document.getElementById("userSelect");
        const allNames = new Set();
        const dates = Object.keys(dbEvangel);
    function renderDayCard(day) {
        const groupsHtml = day.groups.map(group => {
            const labelClass = group.labelColor === "orange" ? "group-label label-orange" : "group-label";
            const rowsHtml = group.rows.map(([place, person, type]) => `
                <tr>
                    <td class="place">${escapeHtml(place)}</td>
                    <td class="person ${buildPersonClass(type)}">${escapeHtml(person)}</td>
                </tr>
            `).join("");

        dates.forEach(date => {
            const opt = document.createElement("option");
            opt.value = date;
            opt.textContent = date;
            dSel.appendChild(opt);
            return `
                <div class="group-row">
                    <div class="${labelClass}">${escapeHtml(group.label)}</div>
                    <div class="table-wrap">
                        <table>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }).join("");

            dbEvangel[date].forEach(item => {
                allNames.add(item.n);
                splitAssignments(item.s)
                    .filter(name => !isHotel(name))
                    .forEach(name => allNames.add(name));
            });
        });
        const legendHtml = day.legend.map(([color, label]) => `
            <div class="legend-row">
                <div class="legend-chip ${color === "yellow" ? "bg-yellow" : ""} ${color === "orange" ? "label-orange" : ""} ${color === "green" ? "bg-green" : ""} ${color === "pink" ? "bg-pink" : ""}"></div>
                <div class="legend-label">${escapeHtml(label)}</div>
            </div>
        `).join("");

        Array.from(allNames).sort((a, b) => a.localeCompare(b, "zh-Hant")).forEach(name => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            uSel.appendChild(opt);
        });
        const mealsHtml = day.meals.map(([name, note]) => `
            <div class="meal-row">
                <div class="meal-name text-red">${escapeHtml(name)}</div>
                <div class="meal-note">${escapeHtml(note)}</div>
            </div>
        `).join("");

        if (dates.length > 0) {
            dSel.value = dates[0];
        }

        render();
        return `
            <article class="day-card" data-theme="${day.theme}">
                <div class="day-head">
                    <h2>${escapeHtml(day.date)}</h2>
                </div>
                <div class="day-body">
                    ${groupsHtml}
                    <div class="legend">${legendHtml}</div>
                    ${mealsHtml ? `<div class="meal-list" style="margin-top:12px;">${mealsHtml}</div>` : ""}
                </div>
            </article>
        `;
    }

    function formatAssignmentList(assignments, selectedUser) {
        return assignments.map(name => {
            const safeName = escapeHtml(name);
            return name === selectedUser ? `<span class="name-highlight">${safeName}</span>` : safeName;
        }).join(", ");
    }

    function render() {
        const date = document.getElementById("dateSelect").value;
        const selectedUser = document.getElementById("userSelect").value;
        const evContainer = document.getElementById("evangelContent");
        const summary = document.getElementById("summaryText");
        const dayData = dbEvangel[date] || [];

        if (dayData.length === 0) {
            evContainer.innerHTML = '<div class="empty">No schedule yet.</div>';
            summary.textContent = "";
            return;
        }

        summary.textContent = selectedUser
            ? `${date} 共 ${dayData.length} 組，已標示 ${selectedUser} 的安排。`
            : `${date} 共 ${dayData.length} 組。`;

        const evHtml = dayData.map(item => {
            const assignments = splitAssignments(item.s);
            const isMe = selectedUser && (item.n === selectedUser || assignments.includes(selectedUser));
            const cardClass = isMe ? "card is-me-card" : "card border-evangel";
            const highlightedLeader = item.n === selectedUser
                ? `<span class="name-highlight">${escapeHtml(item.n)}</span>`
                : escapeHtml(item.n);
            const mapUrl = assignments.some(name => name.includes("帝后")) ? URL_TEIO : URL_TENSI;

            return `
                <article class="${cardClass}">
                    <div class="card-main">
                        <p class="card-title">📖 ${highlightedLeader}</p>
                        <p class="card-list">${formatAssignmentList(assignments, selectedUser)}</p>
                    </div>
                    <a class="hotel-link" href="${mapUrl}" target="_blank" rel="noopener noreferrer">MAP</a>
                </article>
            `;
        }).join("");
    function renderSummaryTable() {
        const rowsHtml = simpleSummary.map(row => `
            <tr>
                <td class="col-630">${escapeHtml(row[0])}</td>
                <td class="col-630">${escapeHtml(row[1])}</td>
                <td class="col-72">${escapeHtml(row[2])}</td>
                <td class="col-72">${escapeHtml(row[3])}</td>
                <td class="col-76">${escapeHtml(row[4])}</td>
                <td class="col-76">${escapeHtml(row[5])}</td>
            </tr>
        `).join("");

        evContainer.innerHTML = evHtml;
        document.getElementById("transContent").innerHTML = '<div class="empty">Daftar sedang diperbarui...</div>';
        return `
            <table>
                <tbody>
                    <tr>
                        <td class="date-cell col-630">6/30</td>
                        <td class="date-cell col-630"></td>
                        <td class="date-cell col-72">7/2</td>
                        <td class="date-cell col-72"></td>
                        <td class="date-cell col-76">7/6</td>
                        <td class="date-cell col-76"></td>
                    </tr>
                    ${rowsHtml}
                </tbody>
            </table>
        `;
    }

    window.addEventListener("DOMContentLoaded", init);
    document.getElementById("scheduleGrid").innerHTML = schedules.map(renderDayCard).join("");
    document.getElementById("summaryTable").innerHTML = renderSummaryTable();
</script>
</body>
</html>
